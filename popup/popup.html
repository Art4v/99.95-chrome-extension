<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>99.95</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="View your schedule dynamically" />
  <link rel="stylesheet" type="text/css" href="popup.css" />
  <link rel="icon" href="/99.95/assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Step-by-step Tutorial Tooltips (hidden by default) -->
  <div id="tutorial-tooltip-container" style="display:none;position:fixed;z-index:2000;top:0;left:0;width:100vw;height:100vh;pointer-events:none;">
    <!-- Tooltips will be injected here by JS -->
  </div>

  <!-- Notification Section -->
  <div class="notif">
    <h1>Next Class Countdown</h1>
    <h2>Details will update dynamically</h2>
  </div>

  <!-- Schedule Blocks -->
  <div class="blocks">
    <!-- Schedule will be dynamically injected here -->
  </div>
  
  <script src="ical.min.js"></script>
  <script src="moment.min.js"></script>
  <script src="moment-timezone-with-data.min.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="popup.js"></script>
  <!-- The settings buttons container is injected by JS, no static HTML needed. -->
</body>
</html>
