<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable Upload</title>
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    <div id="user-selection-modal" class="modal">
        <div class="modal-content">
            <h2>Are you a...</h2>
            <div class="button-group">
                <button id="mac-user" class="platform-btn">Mac/Chromebook User</button>
                <button id="windows-user" class="platform-btn">Windows/Linux User</button>
            </div>
        </div>
    </div>

    <div class="upload-container" style="display:none;">
        <div id="change-platform-container">
            <a href="#" id="change-platform">Change platform</a>
        </div>
        <h1>Upload Timetable</h1>
        <div id="instructions-list"></div>
        <div id="upload-options"></div>
        <button id="upload-button" style="margin-top:20px;">Upload Timetable</button>
        <div id="status-message" class="status hidden"></div>
    </div>
    <!-- Load dependencies -->
    <script src="ical.min.js"></script>
    <script src="moment.min.js"></script>
    <script src="moment-timezone-with-data.min.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="landing.js"></script>
</body>
</html>
