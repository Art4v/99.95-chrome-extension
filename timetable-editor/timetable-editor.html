<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Edit Timetable - 99.95</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Edit your timetable before proceeding" />
    <link rel="stylesheet" type="text/css" href="timetable-editor.css" />
    <link rel="icon" href="/99.95/assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela&display=swap" rel="stylesheet">
</head>
<body>
    <div class="editor-container">
        <!-- Header -->
        <div class="editor-header">
            <h1>Edit Your Timetable</h1>
            <p class="subtitle">Click on any cell to edit the class. Add new classes to the list below.</p>
        </div>

        <!-- Schedule Type Selector -->
        <div class="schedule-type-selector">
            <label for="schedule-type">Schedule Type:</label>
            <select id="schedule-type">
                <option value="weekly">Weekly</option>
                <option value="biweekly">Biweekly (A/B)</option>
                <option value="triweekly">Triweekly (A/B/C)</option>
            </select>
        </div>

        <!-- Timetable Grid -->
        <div class="timetable-grid-container">
            <div class="timetable-grid" id="timetable-grid">
                <!-- Grid will be generated by JavaScript -->
            </div>
        </div>

        <!-- Class Management Section -->
        <div class="class-management">
            <div class="class-list-section">
                <h3>Available Classes</h3>
                <div class="class-list" id="class-list">
                    <!-- Classes will be populated here -->
                </div>
                <div class="add-class-section">
                    <input type="text" id="new-class-input" placeholder="Enter new class name..." maxlength="50">
                    <button id="add-class-btn" class="primary-btn">Add Class</button>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="back-btn" class="secondary-btn">Back to Upload</button>
            <button id="confirm-btn" class="primary-btn">Confirm Timetable</button>
        </div>

        <!-- Status Message -->
        <div id="status-message" class="status hidden"></div>
    </div>

    <!-- Class Edit Modal -->
    <div id="class-edit-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Class</h3>
                <button class="close-modal" aria-label="Close">×</button>
            </div>
            <div class="modal-body">
                <div class="time-display">
                    <span id="modal-time"></span>
                </div>
                <div class="class-selection">
                    <label for="class-select">Select Class:</label>
                    <select id="class-select">
                        <!-- Options will be populated -->
                    </select>
                </div>
                <div class="class-details">
                    <div class="detail-row">
                        <label for="teacher-input">Teacher:</label>
                        <input type="text" id="teacher-input" placeholder="Teacher name" maxlength="30">
                    </div>
                    <div class="detail-row">
                        <label for="room-input">Room:</label>
                        <input type="text" id="room-input" placeholder="Room number" maxlength="20">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-class-btn" class="primary-btn">Save</button>
                <button id="cancel-class-btn" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Load dependencies -->
    <script src="../popup/ical.min.js"></script>
    <script src="../popup/moment.min.js"></script>
    <script src="../popup/moment-timezone-with-data.min.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="timetable-editor.js"></script>
</body>
</html>
