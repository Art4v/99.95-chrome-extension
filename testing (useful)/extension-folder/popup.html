<!DOCTYPE html>
<html>
<head>
  <title>ICS to JSON Parser</title>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    button {
      padding: 8px 16px;
      margin-top: 15px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #3367d6;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      background-color: #f8f8f8;
      min-height: 20px;
    }
    .success {
      color: #28a745;
    }
    .error {
      color: #dc3545;
    }
    #fileInput {
      margin-top: 15px;
      width: 100%;
    }
  </style>
</head>
<body>
  <h2>ICS to JSON Parser</h2>
  <p>Convert your ICS calendar file to JSON format and store it in Chrome storage.</p>
  
  <input type="file" id="fileInput" accept=".ics">
  <button id="parseButton">Parse and Store</button>
  <button id="consoleButton">Print to Console</button>
  
  <div id="status"></div>
  
  <script src="ics-parser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
